name: foundation-ci

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus/interfaces/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run check
      - run: npm run build
      - run: npm run test

  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./interfaces/gateway_go/...

  brain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus/providers/brain_python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest

  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus/providers/engine_rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
