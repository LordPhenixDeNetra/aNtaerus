name: foundation-ci

on:
  push:
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  web-fast:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus/interfaces/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm run test

  web-heavy:
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus/interfaces/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm run build
      - run: npm run test
      - run: chmod +x ../../scripts/validation/smoke-web.sh
      - run: ../../scripts/validation/smoke-web.sh

  gateway-fast:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: antaerus
          args: --config ../.golangci.yml
      - run: go test ./interfaces/gateway_go/...

  gateway-heavy:
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: antaerus
          args: --config ../.golangci.yml
      - run: go test ./interfaces/gateway_go/...
      - run: go build ./interfaces/gateway_go/cmd/gateway
      - run: chmod +x ./scripts/validation/smoke-gateway.sh
      - run: ./scripts/validation/smoke-gateway.sh

  brain-fast:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus/providers/brain_python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests ../../kernel
      - run: python -m ruff format --check src tests ../../kernel
      - run: python -m mypy src ../../kernel
      - run: python run_import_linter.py
      - run: python -m pytest -m "not integration"

  brain-heavy:
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus/providers/brain_python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests ../../kernel
      - run: python -m ruff format --check src tests ../../kernel
      - run: python -m mypy src ../../kernel
      - run: python run_import_linter.py
      - run: python -m pytest
      - run: chmod +x ../../scripts/validation/smoke-brain.sh
      - run: ../../scripts/validation/smoke-brain.sh

  engine-fast:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus/providers/engine_rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo check
      - run: cargo test

  engine-heavy:
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antaerus/providers/engine_rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo check
      - run: cargo test
      - run: cargo build
      - run: chmod +x ../../scripts/validation/smoke-engine.sh
      - run: ../../scripts/validation/smoke-engine.sh
