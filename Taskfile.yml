version: "3"

vars:
  PROTOC_BIN: '{{default "protoc" .PROTOC_BIN}}'

tasks:
  lint:
    desc: Run all lint checks
    deps:
      - lint:web
      - lint:python
      - lint:go
      - lint:rust

  typecheck:
    desc: Run all type checks
    deps:
      - typecheck:web
      - typecheck:python

  test:
    desc: Run all tests
    deps:
      - test:web
      - test:python
      - test:go
      - test:rust
      - test:security
      - test:smoke

  build:
    desc: Run all builds
    deps:
      - build:web
      - build:go
      - build:rust

  generate:proto:
    desc: Generate protobuf artifacts for Go and Rust
    deps:
      - generate:proto:go
      - generate:proto:rust

  generate:proto:go:
    desc: Generate Go protobuf stubs
    cmds:
      - '{{.PROTOC_BIN}} --proto_path=antaerus/kernel/proto --go_out=paths=source_relative:antaerus/interfaces/gateway_go/internal/gen/enginepb --go-grpc_out=paths=source_relative:antaerus/interfaces/gateway_go/internal/gen/enginepb antaerus/kernel/proto/engine.proto'

  generate:proto:rust:
    desc: Generate Rust gRPC stubs with tonic-build helper
    dir: antaerus/providers/engine_rust
    cmds:
      - cargo run --manifest-path tools/proto_codegen/Cargo.toml

  lint:web:
    dir: antaerus/interfaces/web
    cmds:
      - npm run lint
      - npm run format:check

  typecheck:web:
    dir: antaerus/interfaces/web
    cmds:
      - npm run check

  test:web:
    dir: antaerus/interfaces/web
    cmds:
      - npm run test

  build:web:
    dir: antaerus/interfaces/web
    cmds:
      - npm run build

  lint:python:
    dir: antaerus/providers/brain_python
    cmds:
      - python -m ruff check src tests ../../kernel
      - python -m ruff format --check src tests ../../kernel
      - python run_import_linter.py

  typecheck:python:
    dir: antaerus/providers/brain_python
    cmds:
      - python -m mypy src ../../kernel

  test:python:
    dir: antaerus/providers/brain_python
    cmds:
      - python -m pytest -m "not integration"
      - python -m pytest

  test:security:
    desc: Run foundational secret safety checks
    dir: antaerus
    cmds:
      - go test ./kernel/settings/...
      - powershell -ExecutionPolicy Bypass -File .\scripts\validation\test-secrets-no-leak.ps1
      - cargo test --test crypto --test secrets

  lint:go:
    dir: antaerus
    cmds:
      - golangci-lint run

  test:go:
    dir: antaerus
    cmds:
      - go test ./interfaces/gateway_go/...

  build:go:
    dir: antaerus
    cmds:
      - go build ./interfaces/gateway_go/cmd/gateway

  lint:rust:
    dir: antaerus/providers/engine_rust
    cmds:
      - cargo fmt --check
      - cargo clippy --all-targets --all-features -- -D warnings
      - cargo check

  test:rust:
    dir: antaerus/providers/engine_rust
    cmds:
      - cargo test

  build:rust:
    dir: antaerus/providers/engine_rust
    cmds:
      - cargo build

  bench:latency:
    desc: Run local latency budgets
    deps:
      - bench:latency:python
      - bench:latency:rust

  bench:latency:python:
    desc: Run the Go to Python latency budget
    dir: antaerus
    cmds:
      - powershell -ExecutionPolicy Bypass -File .\scripts\validation\bench-go-python-latency.ps1

  bench:latency:rust:
    desc: Run the Go to Rust latency budget
    dir: antaerus
    cmds:
      - powershell -ExecutionPolicy Bypass -File .\scripts\validation\bench-go-rust-latency.ps1

  test:smoke:
    desc: Run smoke validation scripts
    deps:
      - smoke:brain
      - smoke:engine
      - smoke:gateway
      - smoke:web

  smoke:brain:
    dir: antaerus
    cmds:
      - powershell -ExecutionPolicy Bypass -File .\scripts\validation\smoke-brain.ps1

  smoke:engine:
    dir: antaerus
    cmds:
      - powershell -ExecutionPolicy Bypass -File .\scripts\validation\smoke-engine.ps1

  smoke:gateway:
    dir: antaerus
    cmds:
      - powershell -ExecutionPolicy Bypass -File .\scripts\validation\smoke-gateway.ps1

  smoke:web:
    dir: antaerus
    cmds:
      - powershell -ExecutionPolicy Bypass -File .\scripts\validation\smoke-web.ps1
